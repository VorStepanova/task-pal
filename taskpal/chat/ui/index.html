<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskPal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <span class="header-icon">📎</span>
    <span class="header-title">TaskPal</span>
    <span id="header-face" class="header-face">😊</span>
    <span id="header-clock" class="header-clock"></span>
    <button id="new-chat-btn" class="new-chat-btn" title="New Chat">＋</button>
  </header>

  <main class="transcript" id="transcript">
    <!-- chat bubbles injected here -->
  </main>

  <footer class="input-bar">
    <textarea
      id="input"
      class="input-field"
      placeholder="Message TaskPal…"
      autocomplete="off"
      rows="1"
    ></textarea>
    <button id="send-btn" class="send-btn" title="Send">
      &#9654;
    </button>
  </footer>

  <script src="chat.js"></script>
</body>
</html>
